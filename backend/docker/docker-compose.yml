services:

  postgres:

    image: pgvector/pgvector:pg17

    container_name: edumind-postgres

    restart: unless-stopped

    environment:

      POSTGRES_DB: edumind

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: EduMind123!

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

volumes:

  postgres_data: